<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheese RNG</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Fredoka', sans-serif;
    background: radial-gradient(circle at top, #2a2a40, #0d0d18);
    color: white;
    overflow: hidden;
}

.game {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    height: 100vh;
}

/* LEFT */
.left {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

.floating {
  position: absolute;
  color: gold;
  font-size: 18px;
  pointer-events: none;
  animation: floatUp 0.8s ease-out forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-40px); opacity: 0; }
}

/* BUTTON */
#rollBtn {
    width: 240px;
    height: 240px;
    background: url("Roll.png") center/cover no-repeat;
    border: none;
    cursor: pointer;
    transition: transform 0.1s, filter 0.2s;
}

#rollBtn:active { transform: scale(0.9); }
#rollBtn.cooldown { filter: brightness(0.4); }

/* CENTER */
.center {
    text-align: center;
    padding-top: 40px;
}

#cheeseName {
    font-size: 34px;
    margin-bottom: 5px;
    transition: transform 0.2s;
}

#rarityText { opacity: 0.7; }

#cheeseImg {
    width: 260px;
    transition: transform 0.2s, filter 0.2s;
}

/* RARE EFFECTS */
.legendary {
    animation: glow 0.5s ease-in-out 4 alternate;
}
@keyframes glow {
    from { filter: drop-shadow(0 0 10px gold); }
    to { filter: drop-shadow(0 0 30px orange); }
}

.shake {
    animation: shake 0.3s;
}
@keyframes shake {
    0%{transform:translate(0)}
    25%{transform:translate(5px,-5px)}
    50%{transform:translate(-5px,5px)}
    75%{transform:translate(5px,5px)}
    100%{transform:translate(0)}
}

#darkOverlay {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 999;
}

/* RIGHT */
.right {
    padding: 10px;
    overflow-y: auto;
}

.pop {
    animation: pop 0.2s ease;
}

button {
    font-family: 'Fredoka', sans-serif;
    background: linear-gradient(145deg, #3a3a5a, #1a1a2e);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    letter-spacing: 0.5px;
}

/* Hover */
button:hover {
    transform: translateY(-2px);
    filter: brightness(1.2);
    box-shadow: 0 6px 14px rgba(0,0,0,0.6);
}

/* Click */
button:active {
    transform: scale(0.95);
}

/* Disabled feel */
button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

button.shop {
    width: 100%;
    margin-top: 6px;
    background: linear-gradient(145deg, #2a5a3a, #1a2e22);
}

button.shop:hover {
    filter: brightness(1.25);
}

button.danger {
    background: linear-gradient(145deg, #5a2a2a, #2e1a1a);
}

button.danger:hover {
    filter: brightness(1.3);
}

@keyframes pop {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

#rollBtn {
  transition: transform 0.05s;
}
#rollBtn:active {
  transform: scale(0.85);
}

button.affordable {
    animation: pulse 0.8s infinite alternate;
}

button.unaffordable {
    background: #222 !important;
    color: #777;
    box-shadow: none;
    cursor: not-allowed;
    filter: grayscale(1);
}

.panel {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* COLLECTION */
.collection img {
    width: 50px;
    opacity: 0.2;
}
.collection img.found {
    opacity: 1;
    transform: scale(1.1);
}

/* ACHIEVEMENTS */
.achievement {
    width: 50px;
    opacity: 0.2;
}
.achievement.unlocked {
    opacity: 1;
    transform: scale(1.1);
}

/* TOP BAR */
.topbar {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
}

button.toggle {
    background: linear-gradient(145deg, #2a3a5a, #1a2235);
}

/* CUTSCENE */
#cutscene {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, gold, black);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    animation: flash 0.2s alternate 6;
}
@keyframes flash {
    from {opacity:0.5;}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="topbar">
    <div>Rolls: <span id="rolls">0</span></div>
    <div>Coins: <span id="coins">0</span></div>
    <div>Luck: <span id="luck">1</span>x</div>
    <div>Streak: <span id="streak">0</span></div>
    <div>Prestige: <span id="prestige">0</span></div>
    <div>PP: <span id="pp">0</span></div>
</div>

<div class="game">

<div id="darkOverlay"></div>

<div class="left">
    <button id="rollBtn"></button>
    <button class="danger" onclick="reset()">Reset</button>
</div>

<div class="center">
    <h2 id="cheeseName">ROLL</h2>
    <div id="rarityText"></div>
    <img id="cheeseImg">
</div>

<div class="right">

<div class="panel">
<b>Collection</b>
<div id="collection" class="collection"></div>
</div>

<div class="panel">
<b>Shop</b>
<button id="luckBtn" class="shop" onclick="upgrade()"></button>
<button class="shop" onclick="prestige()">Prestige (1000 rolls)</button>

<div class="panel">
<b>PP Shop</b>

<button class="shop" onclick="buyPP('rollSpeed')">
 Faster Rolls (Cost: <span id="pp_rollSpeed_cost"></span>)
</button>

<button class="shop" onclick="buyPP('luckBoost')">
 More Luck (Cost: <span id="pp_luckBoost_cost"></span>)
</button>

<button class="shop" onclick="buyPP('coinBoost')">
 More Coins (Cost: <span id="pp_coinBoost_cost"></span>)
</button>
</div>

<div class="panel">
<b>Auto Roll</b><br><br>

<button id="autoBtn" class="shop" onclick="toggleAutoRoll()">
    Enable Auto Roll (10,000 coins)
</button>
</div>

<div class="panel">

<div class="panel">
<b>Achievements</b>
<div id="achievements"></div>
</div>

<div class="panel">
<b>Changelog</b>
<ul id="changelog"></ul>
</div>

<div class="panel">
<b>Settings</b><br>
<button class="toggle" onclick="toggleCutscenes()">
    Cutscenes: <span id="cutsceneToggle">ON</span>
</button>
</div>

</div>
</div>

<div id="cutscene">
<h1>WHAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAT???!!!?!?!</h1>
<img id="cutsceneImg" width="300">
</div>

<script>
// ================= STATE =================
let state={
 rolls:0,
 coins:0,
 luck:1,
 found:{},
 achievements:{},
 pity:0,
 streak:0,
 prestige: 0,
 pp: 0,
 noCutscenes: false,
 idleLevel: 0,
 autoRoll: false,
 fastRoll: false,
 meta: {
  rollSpeed: 0,
  luckBoost: 0,
  coinBoost: 0
},
};

// ====================== GOD DROP ======================

function godDrop(c){

if(state.noCutscenes){
   // minimal version (no flash/shake)
   document.getElementById("cheeseName").textContent = c.name;
   playSound(c.name);
   return;
 }

 const overlay = document.getElementById("darkOverlay");
 const img = document.getElementById("cheeseImg");
 const name = document.getElementById("cheeseName");

 // STEP 1: blackout (short, not 3 seconds)
 overlay.style.opacity = 1;

 setTimeout(() => {

  // STEP 2: reveal phase
  overlay.style.opacity = 0;

  // BIG visual hit
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),300);

  img.classList.add("pop","legendary");
  setTimeout(()=>img.classList.remove("pop"),300);

  name.textContent = "🔥 " + c.name.toUpperCase() + " 🔥";

  // sound hit (reuse your system)
  playSound(c.name);
  playSound("sounds/giant.mp3");

 }, 400);
}

// ================= DATA =================
const cheeses=[
 {name:"Moldy",chance:10,img:"moldy.png",value:1},
 {name:"Common",chance:10,img:"common.png",value:1},
 {name:"String",chance:10,img:"string.png",value:1},
 {name:"American",chance:10,img:"american.png",value:1},
 {name:"Blue",chance:10,img:"blue.png",value:1},
 {name:"Parmesan",chance:10,img:"parmesan.png",value:1},

 {name:"Rare",chance:8,img:"rare.png",value:3},
 {name:"Melted",chance:8,img:"melted.png",value:3},
 {name:"Grilled",chance:8,img:"grilled.png",value:3},

 {name:"Epic",chance:2,img:"epic.png",value:7},
 {name:"Mini",chance:2,img:"mini.png",value:12},
 {name:"Giant",chance:2,img:"giant.png",value:14},
 {name:"Radioactive",chance:2,img:"radioactive.png",value:16},
 {name:"PepperJack",chance:2,img:"pepperjack.png",value:16},

 {name:"Legendary",chance:2,img:"legendary.png",value:20},
 {name:"Iced",chance:1,img:"iced.png",value:40},
 {name:"Square",chance:1,img:"square.png",value:40},
 {name:"Bomb",chance:1,img:"bomb.png",value:40},

 {name:"Godly",chance:0.4,img:"godly.png",value:50},
 {name:"Heavenly",chance:0.2,img:"heavenly.png",value:200},
 {name:"Devil",chance:0.2,img:"devil.png",value:200},
 {name:"Galaxy",chance:0.1,img:"galaxy.png",value:250},
 {name:"Glitch",chance:0.06,img:"glitch.png",value:300},
 {name:"EXE",chance:0.03,img:"exe.png",value:400},
 {name:"Anime Girl",chance:0.01,img:"animegirl.png",value:800},
];

function getLuckCost(){
 return Math.floor(50 * Math.pow(1.6, state.luck));
}

if(state.found["Legendary"]) state.luck += 0.2;

function getPPCost(type){
  let lvl = state.meta[type];
  return Math.floor(5 * Math.pow(1.8, lvl));
}

function buyPP(type){
  let cost = getPPCost(type);

  if(state.pp < cost) return;

  state.pp -= cost;
  state.meta[type]++;

  // juicy feedback
  document.body.classList.add("pop");
  setTimeout(()=>document.body.classList.remove("pop"),150);

  updateUI();
}

// ================== IDLE ====================

function upgradeIdle(){
 let cost = getIdleCost();
 if(state.coins < cost) return;

 state.coins -= cost;
 state.idleLevel++;

 document.body.classList.add("pop");
 setTimeout(()=>document.body.classList.remove("pop"),150);
}

// ==================== SOUND ===================

const soundCache = {};
let audioUnlocked = false;

function unlockAudio(){
 if(audioUnlocked) return;
 const a = new Audio("common.mp3");
 a.volume = 0;
 a.play().then(()=>{ a.pause(); audioUnlocked = true; });
}

function playSound(name){
 if(!audioUnlocked) return;

 const s = new Audio(name + ".mp3");
 s.volume = 0.6;
 s.playbackRate = 0.95 + Math.random()*0.1;
 s.play().catch(()=>{});
}
    
// ================= SAVE =================
function save(){localStorage.setItem("save",JSON.stringify(state))}
function load(){
  let s = JSON.parse(localStorage.getItem("save"));
  if(!s) return;

  state = {
    ...state,   // keeps defaults
    ...s        // overrides with save
  };

  // ensure meta exists (for old saves)
  if(!state.meta){
    state.meta = {
      rollSpeed: 0,
      luckBoost: 0,
      coinBoost: 0
    };
  }
}
load();
setInterval(save,3000);

// ================= ROLL =================
function roll(){
 let weights = cheeses.map(c => {

  // base weight
  let w = c.chance;

  // rarity factor (smaller chance = bigger boost)
  let rarityFactor = Math.log10(1 + (1 / c.chance));

  // apply luck scaling (tweak 0.15 if needed)
  let luckBoost = 1 + (state.luck + state.meta.luckBoost * 0.3 * 0.08 * rarityFactor);

  // apply prestige too
  w *= luckBoost * getPrestigeMultiplier();

  return w;
 });

 // pity boosts ONLY rare items more aggressively
 weights = weights.map((w, i) => {
  if(cheeses[i].chance < 5){
    return w + state.pity * 0.2;
  }
  return w;
 });

 let total = weights.reduce((a,b)=>a+b,0);
 let r = Math.random()*total;

 for(let i=0;i<cheeses.length;i++){
  if(r < weights[i]) return cheeses[i];
  r -= weights[i];
 }

 return cheeses[0];
}

// prestige

function getPrestigeMultiplier(){
 return 1 + (state.pp * 0.25); // +25% luck per prestige point
}

function prestige(){
 if(state.rolls < 1000) return;

 let gainedPP = Math.floor(state.rolls / 1000);

 state.pp += gainedPP;
 state.prestige++;

 // RESET PROGRESSION (keep prestige)
 state.rolls = 0;
 state.coins = 0;
 state.luck = 1;
 state.streak = 0;
 state.pity = 0;
 state.found = {};
 state.achievements = {};

 alert("Prestiged! +" + gainedPP + " PP");
}

// ================= DISPLAY =================
function display(c){
 let nameEl = document.getElementById("cheeseName");
 let imgEl = document.getElementById("cheeseImg");
playSound(c.name);

if(c.name === "EXE"){
  state.fastRoll = true;
}

 imgEl.classList.add("pop");
setTimeout(()=>imgEl.classList.remove("pop"),200);

 nameEl.textContent=c.name;
 imgEl.src=c.img;

 imgEl.classList.remove("legendary","shake");

 if(c.chance <= 1){
 godDrop(c);
}
else if(c.chance <= 4){
 cutscene(c);
  imgEl.classList.add("legendary");
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),300);
}

let gain = Math.floor(
  c.value *
  (1 + state.luck/8) *
  (1 + state.meta.coinBoost * 0.25)
);

if(c.chance < 2){
  document.body.style.background = "white";
  setTimeout(()=>{
    document.body.style.background = "";
  }, 80);
}

// 🎯 CRIT SYSTEM
let crit = false;
if(Math.random() < 0.08){ // 8% chance
  gain *= 3;
  crit = true;
}

// combo system
if(c.chance <= 10) state.streak++;
else state.streak = 0;

gain += state.streak;

spawnText("+" + gain);

state.coins += gain;

if(crit){
 document.body.classList.add("shake");
 setTimeout(()=>document.body.classList.remove("shake"),200);
}

 if(c.name==="Legendary" || c.name==="Godly") state.pity=0;
 else state.pity++;

 state.found[c.name]=true;

 if(c.chance<=1) cutscene(c);

 // small random bonus event
if(Math.random() < 0.03){
 let bonus = 50 + Math.floor(Math.random()*100);
 state.coins += bonus;

 document.getElementById("cheeseName").textContent = "BONUS +" + bonus;
}
}

function spawnText(text){
  let el = document.createElement("div");
  el.className = "floating";
  el.textContent = text;

  el.style.left = (window.innerWidth/2 + (Math.random()*100-50)) + "px";
  el.style.top = (window.innerHeight/2 + 50) + "px";

  document.body.appendChild(el);

  setTimeout(()=>el.remove(),800);
}

// ================= CUTSCENE =================
function cutscene(c){
 if(state.noCutscenes) return;

 let cs=document.getElementById("cutscene");
 document.getElementById("cutsceneImg").src=c.img;
 cs.style.display="flex";
 setTimeout(()=>cs.style.display="none",900);
}

function toggleCutscenes(){
 state.noCutscenes = !state.noCutscenes;
 updateUI();
}

// ================= COLLECTION =================
function renderCollection(){
 let el=document.getElementById("collection");
 el.innerHTML="";
 cheeses.forEach(c=>{
  let img=document.createElement("img");
  img.src=c.img;
  if(state.found[c.name]) img.classList.add("found");
  el.appendChild(img);
 });
}

// ================= SHOP =================
function upgrade(){
 let cost = getLuckCost();

 if(state.coins < cost) return;

 state.coins -= cost;
 state.luck += 0.15;

 // satisfying feedback
 document.body.classList.add("pop");
 setTimeout(()=>document.body.classList.remove("pop"),150);
}

// ================= ACHIEVEMENTS =================
const achievements = [
 {id:"r10",cond:()=>state.rolls>=10,img:"10.png"},
 {id:"r100",cond:()=>state.rolls>=100,img:"100.png"},
 {id:"r500",cond:()=>state.rolls>=500,img:"500.png"},
 {id:"r1000",cond:()=>state.rolls>=1000,img:"1000.png"},

 {id:"c1k",cond:()=>state.coins>=1000,img:"coin1k.png"},
 {id:"c10k",cond:()=>state.coins>=10000,img:"coin10k.png"},
 {id:"c100k",cond:()=>state.coins>=100000,img:"coin100k.png"},

 // 🧀 collection based
 {id:"completionist",cond:()=>Object.keys(state.found).length===cheeses.length,img:"all.png"},

 // 💀 chaos / rare events
 {id:"streak10",cond:()=>state.streak>=10,img:"streak10.png"},

 // 👑 prestige
 {id:"prestige1",cond:()=>state.prestige>=1,img:"prestige1.png"},
 {id:"prestige5",cond:()=>state.prestige>=5,img:"prestige5.png"},
];

function renderAchievements(){
 let el = document.getElementById("achievements");
 el.innerHTML = "";

 achievements.forEach(a=>{
  let unlocked = a.cond();

  if(unlocked) state.achievements[a.id] = true;

  let img = document.createElement("img");
  img.src = a.img;
  img.className = "achievement " + (state.achievements[a.id] ? "unlocked" : "");

  // ✨ hover tooltip
  img.title = a.id;

  // 🔥 pop effect when newly unlocked
  if(unlocked && !img.dataset.done){
    img.style.animation = "pop 0.3s ease";
    img.dataset.done = true;
  }

  el.appendChild(img);
 });
}

// ================= CHANGELOG =================
const changelog=[
  "ALOT"
];

function renderChangelog(){
 let el=document.getElementById("changelog");
 el.innerHTML="";
 changelog.forEach(c=>{
  let li=document.createElement("li");
  li.textContent=c;
  el.appendChild(li);
 });
}

// ================= CLICK / HOLD =================
let cooldown=false;
let holding=false;

let rolling = false;
let rollTimer = null;

function unlockRoll(){
 rolling = false;

 if(rollTimer){
  clearTimeout(rollTimer);
  rollTimer = null;
 }
}

function doRoll(){
 if(rolling) return;
 rolling = true;

 document.getElementById("cheeseName").textContent = "...";

 let i = 0;

 function spin(){
  try {
   document.getElementById("cheeseImg").src =
     cheeses[Math.floor(Math.random()*cheeses.length)].img;

   i++;

   let maxSpins = state.fastRoll ? 1 : 6;

if(i > maxSpins){
    let c = roll();
    state.rolls++;
    display(c);
    updateUI();

    unlockRoll(); // ✅ ALWAYS SAFE UNLOCK
    return;
   }

   let base = state.fastRoll ? 10 : 70;
let speed = Math.max(15, base - state.meta.rollSpeed * 5);
rollTimer = setTimeout(spin, speed);

  } catch(e){
   console.error("Roll error:", e);
   unlockRoll(); // 💥 prevents permanent lock even if something breaks
  }
 }

 spin();
}

const btn=document.getElementById("rollBtn");

btn.onmousedown=()=>{
 holding=true;
 loop();
};
btn.onmouseup=()=>holding=false;
btn.onmouseleave=()=>holding=false;

function loop(){
 if(!holding) return;
 doRoll();
 setTimeout(loop,150);
}

// ================ AUTO ROLL ==================

let autoInterval = null;

function toggleAutoRoll(){
 if(!state.autoRoll){
   if(state.coins < 10000) return;

   state.coins -= 10000;
   state.autoRoll = true;

   autoInterval = setInterval(()=>{
     if(!rolling){
       doRoll();
     }
   }, 200);

 } else {
   state.autoRoll = false;

   if(autoInterval){
     clearInterval(autoInterval);
     autoInterval = null;
   }
 }

 updateUI();
}

// ================= UI =================
function updateUI(){
 document.getElementById("rolls").textContent=state.rolls;
 document.getElementById("coins").textContent=state.coins;
 document.getElementById("luck").textContent=state.luck.toFixed(1);
 document.getElementById("streak").textContent=state.streak;
 document.getElementById("prestige").textContent = state.prestige;
 document.getElementById("pp").textContent = state.pp;
 document.getElementById("cutsceneToggle").textContent = state.noCutscenes ? "OFF" : "ON";
 document.getElementById("pp_rollSpeed_cost").textContent = getPPCost("rollSpeed");
document.getElementById("pp_luckBoost_cost").textContent = getPPCost("luckBoost");
document.getElementById("pp_coinBoost_cost").textContent = getPPCost("coinBoost");

 renderCollection();
 renderAchievements();
 renderChangelog();
 save();

let autoBtn = document.getElementById("autoBtn");

if(state.autoRoll){
 autoBtn.textContent = "Disable Auto Roll";
 autoBtn.classList.remove("unaffordable");
 autoBtn.classList.remove("affordable");
}else{
 autoBtn.textContent = "Enable Auto Roll (10,000 coins)";

 if(state.coins >= 10000){
   autoBtn.classList.add("affordable");
   autoBtn.classList.remove("unaffordable");
 }else{
   autoBtn.classList.add("unaffordable");
   autoBtn.classList.remove("affordable");
 }
}

let cost = getLuckCost();
let btn = document.getElementById("luckBtn");

btn.textContent = `+Luck (Cost: ${cost})`;

if(state.coins >= cost){
    btn.classList.remove("unaffordable");
    btn.classList.add("affordable");
}else{
    btn.classList.remove("affordable");
    btn.classList.add("unaffordable");
}

let idleBtn = document.getElementById("idleBtn");
let idleCost = getIdleCost();

idleBtn.textContent = `Idle Income Lv.${state.idleLevel} (Cost: ${idleCost})`;

if(state.coins >= idleCost){
 idleBtn.classList.add("affordable");
 idleBtn.classList.remove("unaffordable");
}else{
 idleBtn.classList.add("unaffordable");
 idleBtn.classList.remove("affordable");
}

}
    document.addEventListener("click", unlockAudio, { once: true });

    setInterval(()=>{
 if(state.idleLevel > 0){
  let income = state.idleLevel * (1 + state.luck + state.meta.luckBoost * 0.3 * 0.3);
  income *= getPrestigeMultiplier();

  state.coins += Math.floor(income);
  updateUI();
 }
}, 1000);

// ================= RESET =================
function reset(){
 localStorage.clear();
 location.reload();
}

updateUI();

</script>

</body>
</html>
